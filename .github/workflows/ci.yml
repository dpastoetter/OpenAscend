name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Opt into Node 24 for JS-based actions (GitHub runner migration).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Gradle wrapper
        run: chmod +x gradlew

      - name: Unit tests (domain + data + app/Compose UI) + debug APK
        run: ./gradlew :core:domain:test :core:data:testDebugUnitTest :app:testDebugUnitTest :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

  instrumented:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - run: chmod +x gradlew

      - name: Instrumented tests (stat/XP smoke on device)
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          disable-animations: true
          emulator-boot-timeout: 900
          # Avoid snapshot save on exit (reduces "stop: Not implemented" / netsim noise on teardown).
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -no-snapshot-save -noaudio -no-boot-anim
          script: ./gradlew connectedDebugAndroidTest --stacktrace
